<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SlothOS Library</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #0e0a1a;
    color: #e8ddff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  header {
    padding: 1rem 1.5rem;
    background: linear-gradient(180deg, #1c0f33 0%, #0e0a1a 100%);
    border-bottom: 1px solid #3b2a5e;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { margin: 0 0 0.5rem 0; font-size: 1.4rem; }
  header .subtitle { color: #9b8ac9; font-size: 0.85rem; }
  .controls {
    display: flex; gap: 0.75rem; flex-wrap: wrap; margin-top: 0.5rem;
    align-items: center;
  }
  .controls select, .controls input {
    background: #1a1030; color: #e8ddff; border: 1px solid #4b3a72;
    padding: 0.4rem 0.6rem; border-radius: 4px; font-size: 0.9rem;
  }
  .controls input[type=search] { min-width: 200px; flex: 1; }
  .controls button {
    background: #5b3aa6; color: white; border: none;
    padding: 0.4rem 0.9rem; border-radius: 4px; cursor: pointer;
    font-weight: 600;
  }
  .controls button:hover { background: #6e4cc4; }
  .controls .count { color: #9b8ac9; font-size: 0.85rem; }
  main {
    padding: 1rem 1.5rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 1rem;
  }
  .card {
    background: #1a1030; border: 1px solid #2f2050; border-radius: 6px;
    overflow: hidden; display: flex; flex-direction: column;
    transition: transform 0.1s ease, border-color 0.1s ease;
  }
  .card:hover { transform: translateY(-2px); border-color: #6e4cc4; }
  .card img {
    width: 100%; aspect-ratio: 1; object-fit: contain;
    background: #0a0613; display: block;
  }
  .card .meta {
    padding: 0.5rem 0.6rem 0.7rem;
    display: flex; flex-direction: column; gap: 0.4rem;
    flex: 1;
  }
  .card .title {
    font-size: 0.85rem; font-weight: 600;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2;
    -webkit-box-orient: vertical; min-height: 2.4rem;
  }
  .card .system {
    font-size: 0.7rem; text-transform: uppercase; color: #b5a3e6;
    letter-spacing: 0.05em;
  }
  .card .play {
    margin-top: auto; background: #5b3aa6; color: white;
    text-align: center; text-decoration: none;
    padding: 0.4rem; border-radius: 3px; font-size: 0.85rem;
    font-weight: 600;
  }
  .card .play:hover { background: #6e4cc4; }
  .empty {
    grid-column: 1 / -1; padding: 3rem; text-align: center; color: #9b8ac9;
  }
  .scan-status {
    font-size: 0.8rem; color: #9b8ac9;
  }
</style>
</head>
<body>
<header>
  <h1>🎮 SlothOS Library</h1>
  <div class="subtitle">LAN emulator — click Play, then Netplay → Host/Join</div>
  <div class="controls">
    <select id="sysFilter">
      <option value="">All Systems</option>
      {% for s in systems %}
      <option value="{{ s }}">{{ s | upper }}</option>
      {% endfor %}
    </select>
    <input type="search" id="search" placeholder="Search title...">
    <button id="scanBtn">Rescan</button>
    <span class="count" id="count"></span>
  </div>
</header>
<main id="grid"></main>

<script>
const grid = document.getElementById('grid');
const sysFilter = document.getElementById('sysFilter');
const search = document.getElementById('search');
const count = document.getElementById('count');
const scanBtn = document.getElementById('scanBtn');

let debounce;
function refresh() {
  clearTimeout(debounce);
  debounce = setTimeout(load, 200);
}
search.addEventListener('input', refresh);
sysFilter.addEventListener('change', load);

async function load() {
  const sys = sysFilter.value;
  const q = search.value.trim();
  const url = `/api/library?limit=500${sys ? `&system=${encodeURIComponent(sys)}` : ''}${q ? `&q=${encodeURIComponent(q)}` : ''}`;
  const r = await fetch(url);
  const data = await r.json();
  count.textContent = `${data.total} title${data.total !== 1 ? 's' : ''}`;
  if (!data.items.length) {
    grid.innerHTML = '<div class="empty">No ROMs found. Drop files in <code>/mnt/seagate/ROMs/{system}/</code> and click Rescan.</div>';
    return;
  }
  grid.innerHTML = data.items.map(r => `
    <div class="card">
      <img src="${r.boxart_url}" alt="${escapeHtml(r.title)}" loading="lazy">
      <div class="meta">
        <div class="title" title="${escapeHtml(r.title)}">${escapeHtml(r.title)}</div>
        <div class="system">${r.system} · ${formatSize(r.file_size)}</div>
        <a class="play" href="${r.play_url}" target="_blank">▶ Play</a>
      </div>
    </div>
  `).join('');
}

scanBtn.addEventListener('click', async () => {
  scanBtn.disabled = true;
  scanBtn.textContent = 'Scanning...';
  try {
    const r = await fetch('/api/scan', { method: 'POST' });
    const data = await r.json();
    scanBtn.textContent = `+${data.inserted} new / ${data.updated} updated`;
    setTimeout(() => { scanBtn.textContent = 'Rescan'; }, 3000);
    await load();
  } catch (e) {
    scanBtn.textContent = 'Failed';
    setTimeout(() => { scanBtn.textContent = 'Rescan'; }, 2000);
  } finally {
    scanBtn.disabled = false;
  }
});

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function formatSize(b) {
  if (b < 1024) return b + 'B';
  if (b < 1048576) return (b/1024).toFixed(1) + 'K';
  return (b/1048576).toFixed(1) + 'M';
}
load();
</script>
</body>
</html>
