<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{{ title }} — SlothOS Play</title>
<style>
  html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; }
  #game { width: 100vw; height: 100vh; }
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    padding: 0.4rem 0.7rem; font-size: 0.8rem; color: #888;
    background: linear-gradient(180deg, rgba(20,10,30,0.8), rgba(0,0,0,0));
    pointer-events: none;
  }
  .topbar a { color: #b5a3e6; pointer-events: auto; }
</style>
</head>
<body>
<div class="topbar">
  <a href="/">← Library</a> · {{ system | upper }} · {{ title }} ·
  <span id="devId">{{ device_id }}</span>
</div>
<div id="game"></div>
<script>
  // Device id — persisted in cookie via server, also here for clarity
  EJS_player = '#game';
  EJS_gameUrl = '/roms/{{ system }}/{{ filename|urlencode | replace("%2F", "%252F") }}';
  EJS_core = '{{ ejs_core }}';
  EJS_pathtodata = '/static/emujs/data/';
  EJS_startOnLoaded = true;
  EJS_language = 'en-US';   // bundle ships en-US.json only (no bare en.json)
  // Threads require SharedArrayBuffer, which browsers only expose on a secure
  // context (HTTPS or http://localhost). On LAN http://192.168.0.33 we must
  // fall back to single-threaded WASM. To enable threads on LAN, either:
  //   (a) access via http://localhost:8444 on Lappy itself, or
  //   (b) start Chrome with --unsafely-treat-insecure-origin-as-secure=http://192.168.0.33:8444
  //   (c) wait for Phase 4 HTTPS.
  EJS_threads = (window.isSecureContext && typeof SharedArrayBuffer !== 'undefined');
  EJS_loadStateURL = '/api/saves/{{ device_id }}/{{ rom_id }}';
  EJS_saveStateURL = '/api/saves/{{ device_id }}/{{ rom_id }}';
  // Netplay: NOT supported in EmulatorJS v4.x (removed in v4.0; rewrite pending upstream).
  // The dead v3 netplay code still ships in emulator.min.js but the v4 WASM cores lack
  // the hooks it needs, so enabling the flags does nothing. Phase 3.1 will evaluate:
  //   (a) RomM frontend (implements its own netplay around EmulatorJS)
  //   (b) Self-host EmulatorJS-netplay-old Rust server + pin to v3.x cores (deprecated)
  //   (c) Wait for upstream netplay rewrite (no ETA)
  // For now: single-device play + save-state sync across devices is the working scope.
</script>
<script src="/static/emujs/data/loader.js"></script>
</body>
</html>
